<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CEH v13 Flashcards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafaf9;
      --surface: #ffffff;
      --border: #e8e6e1;
      --border-strong: #ccc9c2;
      --text: #1a1916;
      --text-muted: #7a7770;
      --text-light: #b0ada6;
      --accent: #1a1916;
      --accent-hover: #3d3b38;
      --correct: #1a6b3c;
      --correct-bg: #f0faf4;
      --wrong: #8b1a1a;
      --wrong-bg: #fdf2f2;
      --tag-bg: #f2f0eb;
      --progress-fill: #1a1916;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 20px 60px;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 760px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 36px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .logo-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .logo-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    /* ── Daily Progress ── */
    .progress-block {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }
    .progress-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
    }
    .progress-bar-wrap {
      width: 140px;
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--progress-fill);
      border-radius: 99px;
      transition: width 0.5s cubic-bezier(.4,0,.2,1);
    }
    .progress-count {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .progress-count span { color: var(--text-light); font-weight: 400; }

    /* ── Domain filter ── */
    .domain-strip {
      width: 100%;
      max-width: 760px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }
    .domain-pill {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 99px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .domain-pill:hover { border-color: var(--border-strong); color: var(--text); }
    .domain-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── Card ── */
    .card-wrap {
      width: 100%;
      max-width: 760px;
      perspective: 1200px;
      margin-bottom: 24px;
    }
    .card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px 44px;
      min-height: 280px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      transition: box-shadow 0.2s;
      animation: fadeSlide 0.35s cubic-bezier(.4,0,.2,1);
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .card-domain {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: var(--tag-bg);
      padding: 4px 10px;
      border-radius: 99px;
    }
    .card-difficulty {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 99px;
    }
    .diff-easy   { background: #f0faf4; color: #1a6b3c; }
    .diff-medium { background: #fff8ed; color: #8a5a00; }
    .diff-hard   { background: #fdf2f2; color: #8b1a1a; }

    .card-qnum {
      margin-left: auto;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--text-light);
    }

    .card-question {
      font-size: 17px;
      line-height: 1.65;
      font-weight: 400;
      color: var(--text);
    }

    /* ── Options ── */
    .options-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      list-style: none;
    }
    .option-btn {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 18px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      cursor: pointer;
      text-align: left;
      font-family: 'Sora', sans-serif;
      font-size: 14.5px;
      line-height: 1.55;
      color: var(--text);
      transition: all 0.15s;
      width: 100%;
    }
    .option-btn:hover:not(:disabled) {
      border-color: var(--border-strong);
      background: var(--tag-bg);
    }
    .option-btn:disabled { cursor: default; }
    .option-letter {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-light);
      min-width: 18px;
      margin-top: 1px;
    }
    .option-btn.correct {
      border-color: var(--correct);
      background: var(--correct-bg);
    }
    .option-btn.correct .option-letter { color: var(--correct); }
    .option-btn.wrong {
      border-color: var(--wrong);
      background: var(--wrong-bg);
    }
    .option-btn.wrong .option-letter { color: var(--wrong); }
    .option-btn.reveal-correct {
      border-color: var(--correct);
      background: var(--correct-bg);
      opacity: 0.6;
    }

    /* ── Explanation ── */
    .explanation-box {
      border-top: 1.5px solid var(--border);
      padding-top: 20px;
      animation: fadeSlide 0.3s ease;
    }
    .explanation-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .explanation-text {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-muted);
    }

    /* ── Actions ── */
    .actions {
      width: 100%;
      max-width: 760px;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .btn-primary {
      flex: 1;
      padding: 14px 28px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Sora', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: -0.01em;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .btn-secondary {
      padding: 14px 20px;
      background: var(--surface);
      color: var(--text);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .btn-secondary:hover { border-color: var(--border-strong); }

    /* ── Loading skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, var(--tag-bg) 25%, var(--border) 50%, var(--tag-bg) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skeleton-line { height: 16px; margin-bottom: 10px; }
    .skeleton-line.short { width: 40%; }
    .skeleton-line.medium { width: 70%; }
    .skeleton-line.full { width: 100%; }
    .skeleton-option {
      height: 52px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    /* ── Day complete ── */
    .day-complete {
      width: 100%;
      max-width: 760px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 60px 44px;
      text-align: center;
      animation: fadeSlide 0.4s ease;
    }
    .day-complete-icon { font-size: 48px; margin-bottom: 20px; }
    .day-complete h2 { font-size: 24px; font-weight: 600; margin-bottom: 10px; letter-spacing: -0.03em; }
    .day-complete p { font-size: 15px; color: var(--text-muted); line-height: 1.6; margin-bottom: 28px; }
    .score-display {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 42px;
      font-weight: 500;
      letter-spacing: -0.04em;
      margin-bottom: 8px;
    }
    .score-label { font-size: 12px; color: var(--text-light); margin-bottom: 32px; }

    /* ── Stats bar ── */
    .stats-bar {
      width: 100%;
      max-width: 760px;
      display: flex;
      gap: 1px;
      margin-bottom: 32px;
      border-radius: 8px;
      overflow: hidden;
      height: 6px;
    }
    .stat-seg {
      flex: 1;
      height: 100%;
      transition: background 0.3s;
    }
    .stat-seg.answered-correct { background: var(--correct); }
    .stat-seg.answered-wrong   { background: #e8b4b4; }
    .stat-seg.unanswered       { background: var(--border); }

    /* ── Error state ── */
    .error-box {
      background: var(--wrong-bg);
      border: 1.5px solid #e8b4b4;
      border-radius: var(--radius);
      padding: 24px 28px;
      width: 100%;
      max-width: 760px;
      font-size: 14px;
      color: var(--wrong);
      line-height: 1.6;
    }

    /* ── API Key setup ── */
    .setup-card {
      width: 100%;
      max-width: 560px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 48px 44px;
      box-shadow: var(--shadow);
      animation: fadeSlide 0.35s ease;
    }
    .setup-card h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.03em; }
    .setup-card p { font-size: 14px; color: var(--text-muted); line-height: 1.65; margin-bottom: 28px; }
    .field-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: block;
    }
    .api-input {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.15s;
    }
    .api-input:focus { border-color: var(--border-strong); }
    .api-note {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 14px;
      line-height: 1.6;
    }
    .api-note a { color: var(--text-muted); }

    /* ── Day strip (7 days) ── */
    .day-strip {
      width: 100%;
      max-width: 760px;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-bottom: 24px;
    }
    .day-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 12px 6px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }
    .day-btn:hover { border-color: var(--border-strong); background: var(--tag-bg); }
    .day-btn.active { background: var(--accent); border-color: var(--accent); }
    .day-btn.active .day-abbr,
    .day-btn.active .day-status-text { color: #fff; }
    .day-btn.today::after {
      content: '';
      position: absolute;
      bottom: 4px;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--correct);
    }
    .day-btn.active.today::after { background: #fff; }
    .day-abbr {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text);
    }
    .day-status-text {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: var(--text-light);
      letter-spacing: 0.04em;
    }
    .day-btn.has-questions .day-status-text { color: var(--correct); }
    .day-btn.active .day-status-text { color: rgba(255,255,255,0.7); }
    .day-btn.active.has-questions .day-status-text { color: #fff; }

    /* ── Fetch progress bar ── */
    .fetch-progress-wrap {
      width: 100%;
      max-width: 760px;
      margin-bottom: 24px;
      animation: fadeSlide 0.3s ease;
    }
    .fetch-progress-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      margin-bottom: 8px;
      text-align: center;
    }
    .fetch-progress-bar {
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .fetch-progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.3s ease;
    }

    /* ── Bookmark / Save button ── */
    .bookmark-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border: 1.5px solid var(--border);
      border-radius: 99px;
      background: var(--surface);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .bookmark-btn:hover { border-color: var(--border-strong); color: var(--text); }
    .bookmark-btn.saved {
      background: #fff8ed;
      border-color: #e0c97a;
      color: #8a5a00;
    }
    .bookmark-btn .bm-icon { font-size: 13px; line-height: 1; }

    /* ── Bank toggle in header ── */
    .bank-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: 1.5px solid var(--border);
      border-radius: 99px;
      background: var(--surface);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .bank-toggle:hover { border-color: var(--border-strong); color: var(--text); }
    .bank-toggle.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .bank-badge {
      background: var(--accent);
      color: #fff;
      font-size: 9px;
      padding: 2px 7px;
      border-radius: 99px;
      font-weight: 500;
    }
    .bank-toggle.active .bank-badge {
      background: #fff;
      color: var(--accent);
    }

    /* ── Saved Bank View ── */
    .bank-view {
      width: 100%;
      max-width: 760px;
      animation: fadeSlide 0.35s ease;
    }
    .bank-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .bank-header h2 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.03em;
    }
    .bank-count {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
    }
    .bank-topics {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .bank-topic-pill {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 99px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .bank-topic-pill:hover { border-color: var(--border-strong); color: var(--text); }
    .bank-topic-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .bank-topic-count {
      font-size: 9px;
      opacity: 0.7;
      margin-left: 4px;
    }
    .bank-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.7;
    }
    .bank-empty-icon { font-size: 40px; margin-bottom: 16px; }
    .bank-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 28px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
      animation: fadeSlide 0.25s ease;
    }
    .bank-card-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .bank-card-q {
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 14px;
    }
    .bank-card-answer {
      font-size: 13px;
      color: var(--correct);
      background: var(--correct-bg);
      padding: 10px 14px;
      border-radius: 8px;
      line-height: 1.55;
      margin-bottom: 10px;
    }
    .bank-card-answer strong { font-weight: 600; }
    .bank-card-explain {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .bank-remove-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--wrong);
      background: none;
      border: 1.5px solid #e8b4b4;
      border-radius: 99px;
      padding: 4px 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .bank-remove-btn:hover { background: var(--wrong-bg); }

    /* ── Responsive: tablet ── */
    @media (max-width: 800px) {
      body { padding: 24px 18px 56px; }
      .card { padding: 32px 32px; }
    }

    /* ── Responsive: phone ── */
    @media (max-width: 600px) {
      body { padding: 16px 14px 48px; }

      header {
        flex-direction: column;
        align-items: flex-start;
        gap: 14px;
        margin-bottom: 20px;
      }

      .progress-block {
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        gap: 6px;
      }
      .progress-label { order: 0; }
      .progress-count { order: 1; }
      .progress-bar-wrap { width: 100%; order: 2; flex-basis: 100%; }

      .day-strip { gap: 5px; margin-bottom: 18px; }
      .day-btn { padding: 10px 4px; border-radius: 8px; }
      .day-abbr { font-size: 10px; }
      .day-status-text { font-size: 8px; }

      .domain-strip { gap: 6px; margin-bottom: 20px; }
      .domain-pill { font-size: 9px; padding: 4px 10px; }

      .card { padding: 22px 18px; min-height: 200px; gap: 18px; }
      .card-question { font-size: 15px; }
      .option-btn { font-size: 13.5px; padding: 12px 14px; gap: 12px; }

      .actions { flex-direction: column; gap: 10px; }
      .btn-primary, .btn-secondary { width: 100%; text-align: center; }

      .setup-card { padding: 32px 22px; }
      .day-complete { padding: 36px 22px; }
      .score-display { font-size: 34px; }
      .day-complete h2 { font-size: 20px; }
      .day-complete p { font-size: 14px; }
    }

    /* ── Responsive: small phone ── */
    @media (max-width: 390px) {
      body { padding: 12px 10px 40px; }
      .logo-title { font-size: 15px; }
      .logo-label { font-size: 9px; }
      .day-strip { gap: 4px; }
      .day-btn { padding: 8px 2px; }
      .day-abbr { font-size: 9px; }
      .day-status-text { font-size: 7px; }
      .card { padding: 18px 14px; }
      .card-question { font-size: 14px; }
      .option-btn { font-size: 12.5px; padding: 10px 12px; gap: 10px; }
      .option-letter { font-size: 11px; }
      .explanation-text { font-size: 13px; }
      .score-display { font-size: 28px; }
      .day-complete h2 { font-size: 18px; }
      .day-complete-icon { font-size: 38px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-label">EC-Council · 312-50v13 · Groq</span>
    <span class="logo-title">CEH Flashcards</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <button class="bank-toggle" id="bankToggle" style="display:none" onclick="toggleBank()">
      <span class="bm-icon">★</span> Saved <span class="bank-badge" id="bankBadge">0</span>
    </button>
    <div class="progress-block" id="progressBlock" style="display:none">
    <div class="progress-label">Daily Target</div>
    <div class="progress-count" id="progressCount">0 <span>/ 20</span></div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
    </div>
    </div>
  </div>
</header>

<div class="day-strip" id="dayStrip" style="display:none"></div>
<div class="domain-strip" id="domainStrip" style="display:none"></div>
<div class="stats-bar" id="statsBar" style="display:none"></div>

<div id="root"></div>

<script>
// ─────────────────────────────────────────────
// Constants
// ─────────────────────────────────────────────
const DAILY_TARGET = 20;
const DAY_NAMES  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAY_ABBRS  = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const DOMAINS = [
  { id: 'all',       label: 'All Domains' },
  { id: 'recon',     label: 'Reconnaissance' },
  { id: 'scanning',  label: 'Scanning & Enum' },
  { id: 'system',    label: 'System Hacking' },
  { id: 'malware',   label: 'Malware Threats' },
  { id: 'sniffing',  label: 'Sniffing & Hijack' },
  { id: 'social',    label: 'Social Engineering' },
  { id: 'web',       label: 'Web & SQL' },
  { id: 'wireless',  label: 'Wireless & Mobile' },
  { id: 'cloud',     label: 'Cloud & IoT' },
  { id: 'crypto',    label: 'Cryptography' },
  { id: 'evading',   label: 'Evading Controls' },
];

const DOMAIN_PROMPTS = {
  all:      'any CEH v13 module (rotate across: reconnaissance, scanning, enumeration, system hacking, malware, sniffing, session hijacking, social engineering, DoS/DDoS, evading IDS/firewalls, web servers, web apps, SQL injection, wireless networks, mobile, IoT/OT, cloud computing, cryptography, AI-driven attacks)',
  recon:    'footprinting and reconnaissance (OSINT, DNS, WHOIS, Google dorking, Shodan, social media, Maltego, Recon-ng, Nmap basics)',
  scanning: 'scanning networks and enumeration (Nmap flags, port states, banner grabbing, SNMP, LDAP, SMB enumeration, Nessus, vulnerability scanning)',
  system:   'system hacking phases (password cracking, privilege escalation, maintaining access, rootkits, keyloggers, steganography, covering tracks)',
  malware:  'malware threats and analysis (virus types, trojans, worms, ransomware, RATs, fileless malware, sandbox evasion, indicators of compromise)',
  sniffing: 'sniffing and session hijacking (ARP poisoning, MITM, Wireshark, MAC flooding, VLAN hopping, TCP session hijacking, SSL stripping)',
  social:   'social engineering (phishing, spear-phishing, vishing, smishing, pretexting, tailgating, baiting, insider threats, BEC)',
  web:      'web application hacking and SQL injection (OWASP Top 10, XSS, CSRF, IDOR, command injection, SQLi union-based, blind SQLi, Burp Suite, web shells)',
  wireless: 'wireless and mobile hacking (WEP/WPA2/WPA3 attacks, evil twin, deauth attacks, KRACK, Bluetooth, mobile platform threats, MDM, APK analysis)',
  cloud:    'cloud computing, IoT, and OT security (AWS/Azure misconfigurations, shared responsibility, container escapes, Shodan IoT, SCADA/ICS attacks, firmware analysis)',
  crypto:   'cryptography (symmetric vs asymmetric, AES, RSA, hashing MD5/SHA, PKI, digital signatures, certificate attacks, PGP, quantum-resistant crypto)',
  evading:  'evading IDS, firewalls, and honeypots (fragmentation, TTL manipulation, proxy chains, obfuscation, polymorphic malware, WAF bypass, honeypot detection)',
};

// ─────────────────────────────────────────────
// Week key — questions refresh each week
// ─────────────────────────────────────────────
function getWeekKey() {
  const now = new Date();
  const jan1 = new Date(now.getFullYear(), 0, 1);
  const weekNum = Math.ceil(((now - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `${now.getFullYear()}-W${String(weekNum).padStart(2, '0')}`;
}

function questionsKey(dayIndex) { return `ceh_q_${getWeekKey()}_${dayIndex}`; }
function answersKey(dayIndex)   { return `ceh_a_${getWeekKey()}_${dayIndex}`; }

// ── Saved Questions Bank (localStorage) ──
const BANK_KEY = 'ceh_saved_bank';

function loadBank() {
  try { return JSON.parse(localStorage.getItem(BANK_KEY)) || []; } catch(e) { return []; }
}
function saveBank(bank) {
  localStorage.setItem(BANK_KEY, JSON.stringify(bank));
}
function isQuestionSaved(q) {
  const bank = loadBank();
  return bank.some(b => b.question === q.question);
}
function toggleSaveQuestion(q) {
  let bank = loadBank();
  const idx = bank.findIndex(b => b.question === q.question);
  if (idx >= 0) {
    bank.splice(idx, 1);
  } else {
    bank.push({ ...q, savedAt: Date.now() });
  }
  saveBank(bank);
  return idx < 0; // returns true if now saved
}
function removeFromBank(question) {
  let bank = loadBank();
  bank = bank.filter(b => b.question !== question);
  saveBank(bank);
}

function loadQuestions(dayIndex) {
  try { return JSON.parse(localStorage.getItem(questionsKey(dayIndex))) || null; } catch(e) { return null; }
}
function saveQuestions(dayIndex, questions) {
  localStorage.setItem(questionsKey(dayIndex), JSON.stringify(questions));
}
function loadAnswers(dayIndex) {
  try { return JSON.parse(localStorage.getItem(answersKey(dayIndex))) || []; } catch(e) { return []; }
}
function saveAnswers(dayIndex, answers) {
  localStorage.setItem(answersKey(dayIndex), JSON.stringify(answers));
}

// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
const todayIndex = new Date().getDay(); // 0 = Sunday

let state = {
  apiKey: localStorage.getItem('ceh_api_key') || '',
  activeDay: todayIndex,
  activeDomain: 'all',
  questions: null,       // array of 20 questions for activeDay
  answers: [],           // array of { selected, correct } for answered Qs
  qPointer: 0,           // current question index within the 20
  answered: null,        // current answer selection (index or null)
  fetching: false,       // batch-fetching in progress
  fetchProgress: 0,      // 0-20 how many fetched so far
  error: null,
  bankOpen: false,       // viewing the saved bank
  bankTopic: 'all',     // selected topic filter in bank
};

// ─────────────────────────────────────────────
// DOM refs
// ─────────────────────────────────────────────
const root = document.getElementById('root');

// ─────────────────────────────────────────────
// Rendering
// ─────────────────────────────────────────────
function updateBankBadge() {
  const bank = loadBank();
  const badge = document.getElementById('bankBadge');
  const toggle = document.getElementById('bankToggle');
  if (badge) badge.textContent = bank.length;
  if (toggle) toggle.style.display = state.apiKey ? '' : 'none';
}

function toggleBank() {
  state.bankOpen = !state.bankOpen;
  state.bankTopic = 'all';
  render();
}

function render() {
  if (!state.apiKey) { renderSetup(); return; }

  updateBankBadge();
  const bankToggle = document.getElementById('bankToggle');
  if (bankToggle) bankToggle.classList.toggle('active', state.bankOpen);

  if (state.bankOpen) {
    document.getElementById('progressBlock').style.display = 'none';
    document.getElementById('dayStrip').style.display = 'none';
    document.getElementById('domainStrip').style.display = 'none';
    document.getElementById('statsBar').style.display = 'none';
    renderBank();
    return;
  }

  document.getElementById('progressBlock').style.display = '';
  document.getElementById('dayStrip').style.display = '';
  document.getElementById('domainStrip').style.display = 'none'; // hidden — day view replaces domain filter
  document.getElementById('statsBar').style.display = '';

  renderDayStrip();
  updateProgress();
  renderStatsBar();

  if (state.fetching) { renderFetching(); return; }
  if (state.error)    { renderError(); return; }

  if (!state.questions) {
    // Try loading from cache
    const cached = loadQuestions(state.activeDay);
    if (cached && cached.length === DAILY_TARGET) {
      state.questions = cached;
      state.answers = loadAnswers(state.activeDay);
      state.qPointer = state.answers.length;
      state.answered = null;
      render();
      return;
    }
    // Need to fetch
    batchFetchQuestions();
    return;
  }

  // All 20 answered?
  if (state.qPointer >= DAILY_TARGET) {
    renderDayComplete();
    return;
  }

  renderCard();
}

function renderDayStrip() {
  const strip = document.getElementById('dayStrip');
  strip.innerHTML = DAY_ABBRS.map((abbr, i) => {
    const cached = loadQuestions(i);
    const answers = loadAnswers(i);
    const hasQs = cached && cached.length === DAILY_TARGET;
    const isToday = i === todayIndex;
    const isActive = i === state.activeDay;
    const statusText = hasQs ? `${answers.length}/${DAILY_TARGET}` : 'Empty';
    return `<button class="day-btn ${isActive ? 'active' : ''} ${isToday ? 'today' : ''} ${hasQs ? 'has-questions' : ''}" data-day="${i}">
      <span class="day-abbr">${abbr}</span>
      <span class="day-status-text">${statusText}</span>
    </button>`;
  }).join('');

  strip.querySelectorAll('.day-btn').forEach(btn => {
    btn.onclick = () => {
      const day = parseInt(btn.dataset.day);
      if (day === state.activeDay) return;
      state.activeDay = day;
      state.questions = null;
      state.answers = [];
      state.qPointer = 0;
      state.answered = null;
      state.error = null;
      state.fetching = false;
      render();
    };
  });
}

function updateProgress() {
  const count = state.answers.length;
  document.getElementById('progressCount').innerHTML = `${count} <span>/ ${DAILY_TARGET}</span>`;
  document.getElementById('progressBar').style.width = `${Math.min(100, (count / DAILY_TARGET) * 100)}%`;
}

function renderStatsBar() {
  const bar = document.getElementById('statsBar');
  bar.innerHTML = Array.from({ length: DAILY_TARGET }, (_, i) => {
    const a = state.answers[i];
    const cls = !a ? 'unanswered' : a.correct ? 'answered-correct' : 'answered-wrong';
    return `<div class="stat-seg ${cls}"></div>`;
  }).join('');
}

function renderFetching() {
  const pct = Math.round((state.fetchProgress / DAILY_TARGET) * 100);
  root.innerHTML = `
    <div class="fetch-progress-wrap">
      <div class="fetch-progress-label">
        Generating ${DAY_NAMES[state.activeDay]}'s questions… ${state.fetchProgress} / ${DAILY_TARGET}
      </div>
      <div class="fetch-progress-bar">
        <div class="fetch-progress-fill" style="width:${pct}%"></div>
      </div>
    </div>
    <div class="card-wrap">
      <div class="card">
        <div>
          <div class="skeleton skeleton-line short" style="margin-bottom:16px"></div>
          <div class="skeleton skeleton-line full"></div>
          <div class="skeleton skeleton-line medium"></div>
        </div>
        <div>
          ${[1,2,3,4].map(() => `<div class="skeleton skeleton-option"></div>`).join('')}
        </div>
      </div>
    </div>
  `;
}

function renderError() {
  root.innerHTML = `
    <div class="error-box">
      <strong>Error generating questions.</strong><br>${state.error}<br><br>
      Check your API key or network and try again.
    </div>
    <div class="actions" style="margin-top:16px">
      <button class="btn-primary" id="retryBtn">Retry</button>
    </div>
  `;
  document.getElementById('retryBtn').onclick = () => {
    state.error = null;
    state.questions = null;
    render();
  };
}

function renderSetup() {
  document.getElementById('progressBlock').style.display = 'none';
  document.getElementById('dayStrip').style.display = 'none';
  document.getElementById('domainStrip').style.display = 'none';
  document.getElementById('statsBar').style.display = 'none';
  root.innerHTML = `
    <div class="setup-card">
      <h2>Set up your API key</h2>
      <p>CEH Flashcards uses the Groq API to generate fresh, scenario-based CEH v13 questions. Enter your API key to get started.</p>
      <label class="field-label" for="keyInput">Groq API Key</label>
      <input class="api-input" id="keyInput" type="password" placeholder="gsk_..." autocomplete="off" />
      <button class="btn-primary" id="saveKeyBtn">Start Studying →</button>
      <p class="api-note">Get a free key at <a href="https://console.groq.com/keys" target="_blank" style="color:var(--text-muted)">console.groq.com</a>.</p>
    </div>
  `;
  document.getElementById('saveKeyBtn').onclick = () => {
    const val = document.getElementById('keyInput').value.trim();
    if (!val.startsWith('gsk_')) { alert('Key must start with gsk_'); return; }
    state.apiKey = val;
    localStorage.setItem('ceh_api_key', val);
    render();
  };
}

function renderCard() {
  const q = state.questions[state.qPointer];
  const letters = ['A', 'B', 'C', 'D'];

  const optionsHTML = q.options.map((opt, i) => {
    let cls = '';
    if (state.answered !== null) {
      if (i === q.correctIndex) cls = 'correct';
      else if (i === state.answered && i !== q.correctIndex) cls = 'wrong';
    }
    return `<li>
      <button class="option-btn ${cls}" data-i="${i}" ${state.answered !== null ? 'disabled' : ''}>
        <span class="option-letter">${letters[i]}</span>
        <span>${opt}</span>
      </button>
    </li>`;
  }).join('');

  const explanationHTML = state.answered !== null ? `
    <div class="explanation-box">
      <div class="explanation-label">Explanation</div>
      <div class="explanation-text">${q.explanation}</div>
    </div>` : '';

  const diffClass = { Easy: 'diff-easy', Medium: 'diff-medium', Hard: 'diff-hard' }[q.difficulty] || 'diff-medium';
  const isLast = state.qPointer + 1 >= DAILY_TARGET && state.answered !== null;

  root.innerHTML = `
    <div class="card-wrap">
      <div class="card">
        <div class="card-meta">
          <span class="card-domain">${q.domain}</span>
          <span class="card-difficulty ${diffClass}">${q.difficulty}</span>
          <span class="card-qnum">#${state.qPointer + 1} of ${DAILY_TARGET}</span>
        </div>
        <p class="card-question">${q.question}</p>
        <ul class="options-list">${optionsHTML}</ul>
        ${explanationHTML}
      </div>
    </div>
    <div class="actions">
      <button class="btn-primary" id="nextBtn" ${state.answered === null ? 'disabled' : ''}>
        ${isLast ? 'See Results' : 'Next Question →'}
      </button>
      ${state.answered !== null ? `<button class="bookmark-btn ${isQuestionSaved(q) ? 'saved' : ''}" id="saveBtn"><span class="bm-icon">${isQuestionSaved(q) ? '★' : '☆'}</span>${isQuestionSaved(q) ? 'Saved' : 'Save'}</button>` : ''}
      ${state.answered === null ? '<button class="btn-secondary" id="skipBtn">Skip</button>' : ''}
    </div>
  `;

  // Option clicks
  root.querySelectorAll('.option-btn').forEach(btn => {
    btn.onclick = () => {
      const idx = parseInt(btn.dataset.i);
      state.answered = idx;
      const isCorrect = idx === q.correctIndex;
      state.answers.push({ selected: idx, correct: isCorrect });
      saveAnswers(state.activeDay, state.answers);
      render();
    };
  });

  // Next
  document.getElementById('nextBtn').onclick = () => {
    state.qPointer++;
    state.answered = null;
    render();
  };

  // Save / bookmark
  const saveBtn = document.getElementById('saveBtn');
  if (saveBtn) {
    saveBtn.onclick = () => {
      toggleSaveQuestion(q);
      render();
    };
  }

  // Skip
  const skipBtn = document.getElementById('skipBtn');
  if (skipBtn) {
    skipBtn.onclick = () => {
      state.answers.push({ selected: -1, correct: false });
      saveAnswers(state.activeDay, state.answers);
      state.qPointer++;
      state.answered = null;
      render();
    };
  }
}

function renderDayComplete() {
  const correctCount = state.answers.filter(a => a.correct).length;
  const pct = Math.round((correctCount / DAILY_TARGET) * 100);
  root.innerHTML = `
    <div class="day-complete">
      <div class="day-complete-icon">${pct >= 80 ? '🎯' : pct >= 60 ? '📈' : '💪'}</div>
      <div class="score-display">${pct}%</div>
      <div class="score-label">${correctCount} correct out of ${DAILY_TARGET} questions</div>
      <h2>${DAY_NAMES[state.activeDay]}'s session complete!</h2>
      <p>Great work! Pick another day above, or come back next week for 140 fresh questions.</p>
      <button class="btn-primary" style="max-width:320px;margin:0 auto;display:block" id="reviewBtn">Review Answers</button>
    </div>
  `;
  document.getElementById('reviewBtn').onclick = () => {
    state.qPointer = 0;
    renderReview();
  };
}

function renderReview() {
  const q = state.questions[state.qPointer];
  const a = state.answers[state.qPointer];
  const letters = ['A', 'B', 'C', 'D'];

  const optionsHTML = q.options.map((opt, i) => {
    let cls = '';
    if (i === q.correctIndex) cls = 'correct';
    else if (a && i === a.selected && i !== q.correctIndex) cls = 'wrong';
    return `<li>
      <button class="option-btn ${cls}" disabled>
        <span class="option-letter">${letters[i]}</span>
        <span>${opt}</span>
      </button>
    </li>`;
  }).join('');

  const diffClass = { Easy: 'diff-easy', Medium: 'diff-medium', Hard: 'diff-hard' }[q.difficulty] || 'diff-medium';
  const resultIcon = a && a.correct ? '✓' : '✗';
  const resultColor = a && a.correct ? 'var(--correct)' : 'var(--wrong)';

  root.innerHTML = `
    <div class="card-wrap">
      <div class="card">
        <div class="card-meta">
          <span class="card-domain">${q.domain}</span>
          <span class="card-difficulty ${diffClass}">${q.difficulty}</span>
          <span class="card-qnum" style="color:${resultColor};font-weight:600">${resultIcon} #${state.qPointer + 1} of ${DAILY_TARGET}</span>
        </div>
        <p class="card-question">${q.question}</p>
        <ul class="options-list">${optionsHTML}</ul>
        <div class="explanation-box">
          <div class="explanation-label">Explanation</div>
          <div class="explanation-text">${q.explanation}</div>
        </div>
      </div>
    </div>
    <div class="actions">
      <button class="btn-secondary" id="prevReviewBtn" ${state.qPointer === 0 ? 'disabled style="opacity:0.3"' : ''}>← Prev</button>
      <button class="btn-primary" id="nextReviewBtn">
        ${state.qPointer + 1 >= DAILY_TARGET ? 'Back to Results' : 'Next →'}
      </button>
      <button class="bookmark-btn ${isQuestionSaved(q) ? 'saved' : ''}" id="saveReviewBtn"><span class="bm-icon">${isQuestionSaved(q) ? '★' : '☆'}</span>${isQuestionSaved(q) ? 'Saved' : 'Save'}</button>
    </div>
  `;

  document.getElementById('prevReviewBtn').onclick = () => {
    if (state.qPointer > 0) { state.qPointer--; renderReview(); }
  };
  document.getElementById('nextReviewBtn').onclick = () => {
    if (state.qPointer + 1 >= DAILY_TARGET) {
      state.qPointer = DAILY_TARGET;
      render();
    } else {
      state.qPointer++;
      renderReview();
    }
  };
  document.getElementById('saveReviewBtn').onclick = () => {
    toggleSaveQuestion(q);
    renderReview();
  };
}

// ─────────────────────────────────────────────
// Saved Bank View
// ─────────────────────────────────────────────
function renderBank() {
  const bank = loadBank();

  // Collect unique topics
  const topicMap = {};
  bank.forEach(q => {
    const t = (q.domain || 'Other').trim();
    topicMap[t] = (topicMap[t] || 0) + 1;
  });
  const topics = Object.keys(topicMap).sort();

  const filtered = state.bankTopic === 'all'
    ? bank
    : bank.filter(q => (q.domain || 'Other').trim() === state.bankTopic);

  // Topic pills
  const topicPills = [
    `<button class="bank-topic-pill ${state.bankTopic === 'all' ? 'active' : ''}" data-topic="all">All<span class="bank-topic-count">${bank.length}</span></button>`,
    ...topics.map(t =>
      `<button class="bank-topic-pill ${state.bankTopic === t ? 'active' : ''}" data-topic="${t}">${t}<span class="bank-topic-count">${topicMap[t]}</span></button>`
    )
  ].join('');

  const letters = ['A', 'B', 'C', 'D'];

  const cardsHTML = filtered.length === 0
    ? `<div class="bank-empty">
        <div class="bank-empty-icon">☆</div>
        ${bank.length === 0
          ? 'No saved questions yet.<br>Answer a question, then click <strong>☆ Save</strong> to add it here.'
          : 'No questions in this topic.'}
      </div>`
    : filtered.map((q, idx) => {
        const diffClass = { Easy: 'diff-easy', Medium: 'diff-medium', Hard: 'diff-hard' }[q.difficulty] || 'diff-medium';
        const correctLetter = letters[q.correctIndex] || '?';
        const correctText = q.options?.[q.correctIndex] || '';
        return `<div class="bank-card" data-idx="${idx}">
          <div class="bank-card-top">
            <span class="card-domain">${q.domain || 'General'}</span>
            <span class="card-difficulty ${diffClass}">${q.difficulty || 'Medium'}</span>
          </div>
          <div class="bank-card-q">${q.question}</div>
          <div class="bank-card-answer"><strong>${correctLetter}.</strong> ${correctText}</div>
          <div class="bank-card-explain">${q.explanation || ''}</div>
          <button class="bank-remove-btn" data-question="${idx}">✕ Remove</button>
        </div>`;
      }).join('');

  root.innerHTML = `
    <div class="bank-view">
      <div class="bank-header">
        <h2>Saved Questions</h2>
        <span class="bank-count">${filtered.length} question${filtered.length !== 1 ? 's' : ''}</span>
      </div>
      ${topics.length > 0 ? `<div class="bank-topics">${topicPills}</div>` : ''}
      ${cardsHTML}
    </div>
  `;

  // Topic pill clicks
  root.querySelectorAll('.bank-topic-pill').forEach(btn => {
    btn.onclick = () => {
      state.bankTopic = btn.dataset.topic;
      renderBank();
    };
  });

  // Remove buttons
  root.querySelectorAll('.bank-remove-btn').forEach(btn => {
    btn.onclick = () => {
      const i = parseInt(btn.dataset.question);
      const q = filtered[i];
      if (q) removeFromBank(q.question);
      updateBankBadge();
      renderBank();
    };
  });
}

// ─────────────────────────────────────────────
// Batch fetch 20 questions for a day
// ─────────────────────────────────────────────
async function batchFetchQuestions() {
  state.fetching = true;
  state.fetchProgress = 0;
  state.error = null;
  render();

  const allQuestions = [];
  // Collect question texts from other days this week to avoid repeats
  const existingTexts = [];
  for (let d = 0; d < 7; d++) {
    if (d === state.activeDay) continue;
    const qs = loadQuestions(d);
    if (qs) qs.forEach(q => existingTexts.push(q.question.slice(0, 80)));
  }

  try {
    // Fetch in batches of 5 (4 batches)
    for (let batch = 0; batch < 4; batch++) {
      const batchSize = 5;
      const dayName = DAY_NAMES[state.activeDay];
      const weekKey = getWeekKey();
      const seed = `${weekKey}-${state.activeDay}-batch${batch}-${Math.random().toString(36).slice(2,6)}`;

      // Build exclusion list from this batch + other days
      const alreadyGenerated = allQuestions.map(q => q.question.slice(0, 80));
      const exclusions = [...existingTexts, ...alreadyGenerated].slice(-60);
      const exclusionNote = exclusions.length > 0
        ? `\n\nDo NOT repeat or paraphrase any of these previously generated questions:\n${exclusions.map((t,i) => `${i+1}. ${t}`).join('\n')}`
        : '';

      const systemPrompt = `You are a CEH v13 exam question generator. Generate realistic, scenario-based multiple-choice questions that mirror the EC-Council 312-50v13 exam style. Questions must be technically accurate, practical, and challenging. Each question must be unique and cover different topics/scenarios.

Respond ONLY with a valid JSON object — no markdown, no code fences.

JSON format:
{
  "questions": [
    {
      "domain": "<short domain name>",
      "difficulty": "<Easy|Medium|Hard>",
      "question": "<scenario-based question text>",
      "options": ["<A>", "<B>", "<C>", "<D>"],
      "correctIndex": <0-3>,
      "explanation": "<2-3 sentence explanation>"
    }
  ]
}`;

      const domainHint = DOMAIN_PROMPTS['all'];
      const userPrompt = `Seed: ${seed}
Generate exactly ${batchSize} unique CEH v13 exam questions covering different domains from: ${domainHint}.
Each must be scenario-based with plausible distractors. Mix Easy/Medium/Hard.${exclusionNote}`;

      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${state.apiKey}`,
        },
        body: JSON.stringify({
          model: 'meta-llama/llama-4-scout-17b-16e-instruct',
          max_tokens: 4000,
          messages: [
            { role: 'system', content: systemPrompt },
            { role: 'user', content: userPrompt },
          ],
          response_format: { type: 'json_object' },
        }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || `API error ${res.status}`);
      }

      const data = await res.json();
      const text = data.choices[0].message.content.trim();
      const clean = text.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);
      const batchQs = parsed.questions || [parsed];

      for (const q of batchQs) {
        if (q.question && Array.isArray(q.options) && q.options.length === 4 && typeof q.correctIndex === 'number') {
          allQuestions.push(q);
        }
      }

      state.fetchProgress = allQuestions.length;
      render();
    }

    // Trim to exactly 20
    const final20 = allQuestions.slice(0, DAILY_TARGET);
    if (final20.length < DAILY_TARGET) {
      throw new Error(`Only generated ${final20.length} valid questions. Please retry.`);
    }

    saveQuestions(state.activeDay, final20);
    state.questions = final20;
    state.answers = loadAnswers(state.activeDay);
    state.qPointer = state.answers.length;
    state.fetching = false;
    state.answered = null;
    render();

  } catch (e) {
    state.fetching = false;
    state.error = e.message;
    render();
  }
}

// ─────────────────────────────────────────────
// Boot
// ─────────────────────────────────────────────
render();
</script>
</body>
</html>
